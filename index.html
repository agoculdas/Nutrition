      fiber: parseFloat(form.fiber) || 0,
    });
    setForm({ name: '', kcal: '', p: '', f: '', c: '', fiber: '' });
  };
  return (
    <div className="custom-form">
      <input value={form.name} onChange={handle('name')} placeholder="Meal name" />
      <div className="form-grid-3">
        <div className="input-with-label"><span className="lbl">KCAL</span><input className="mono" type="number" inputMode="decimal" value={form.kcal} onChange={handle('kcal')} /></div>
        <div className="input-with-label"><span className="lbl">PROTEIN</span><input className="mono" type="number" inputMode="decimal" value={form.p} onChange={handle('p')} /></div>
        <div className="input-with-label"><span className="lbl">FAT</span><input className="mono" type="number" inputMode="decimal" value={form.f} onChange={handle('f')} /></div>
        <div className="input-with-label"><span className="lbl">CARBS</span><input className="mono" type="number" inputMode="decimal" value={form.c} onChange={handle('c')} /></div>
        <div className="input-with-label"><span className="lbl">FIBER</span><input className="mono" type="number" inputMode="decimal" value={form.fiber} onChange={handle('fiber')} /></div>
      </div>
      <div className="form-actions">
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={submit}>Add meal</button>
      </div>
    </div>
  );
}

function NumField({ label, unit, value, onChange, error, min, step }) {
  const id = React.useId();
  return (
    <div className="field">
      <div className={`field-shell ${error ? 'error' : ''}`}>
        <label className="field-lbl" htmlFor={id}>{label}</label>
        <div className="field-row">
          <input
            id={id}
            className="field-input"
            type="number"
            inputMode="decimal"
            pattern="[0-9]*"
            value={value}
            min={min}
            step={step || '1'}
            onChange={(e) => onChange(e.target.value)}
          />
          {unit && <span className="field-unit">{unit}</span>}
        </div>
      </div>
      {error && <div className="field-error">{error}</div>}
    </div>
  );
}

function RangePair({ name, unit, minVal, maxVal, onMinChange, onMaxChange, sliderMin, sliderMax, error, context }) {
  const lo = Number.isFinite(parseFloat(minVal)) ? parseFloat(minVal) : sliderMin;
  const hi = Number.isFinite(parseFloat(maxVal)) ? parseFloat(maxVal) : sliderMax;
  const span = sliderMax - sliderMin || 1;
  const loPct = Math.max(0, Math.min(100, ((lo - sliderMin) / span) * 100));
  const hiPct = Math.max(0, Math.min(100, ((hi - sliderMin) / span) * 100));
  return (
    <div className={`range-pair ${error ? 'error' : ''}`}>
      <div className="range-pair-head">
        <span className="range-pair-name">{name}</span>
        <span className="range-pair-readout">
          {Math.round(lo)}<span className="sep">–</span>{Math.round(hi)}<span className="unit">{unit}</span>
        </span>
      </div>
      <div className="range-rail-wrap">
        <div className="range-rail" />
        <div className="range-rail-fill" style={{ left: `${loPct}%`, width: `${Math.max(0, hiPct - loPct)}%` }} />
        <input
          className="range-input"
          type="range"
          min={sliderMin}
          max={sliderMax}
          step="1"
          value={Math.min(hi, lo)}
          onChange={(e) => onMinChange(e.target.value)}
        />
        <input
          className="range-input"
          type="range"
          min={sliderMin}
          max={sliderMax}
          step="1"
          value={Math.max(lo, hi)}
          onChange={(e) => onMaxChange(e.target.value)}
        />
      </div>
      <div className="range-pair-axis">
        <span>{sliderMin}</span>
        <span>{sliderMax}{unit}</span>
      </div>
      {context && <div className="range-pair-context">{context}</div>}
      {error && <div className="field-error" style={{ marginTop: 8 }}>{error}</div>}
    </div>
  );
}

function SettingsSheet({ targets, totals, onClose, onSave, onReset }) {
  const [form, setForm] = useState({
    protein: String(targets.protein),
    caloriesTarget: String(targets.caloriesTarget),
    caloriesFloor: String(targets.caloriesFloor),
    fatMin: String(targets.fat.min),
    fatMax: String(targets.fat.max),
    carbsMin: String(targets.carbs.min),
    carbsMax: String(targets.carbs.max),
    fiberMin: String(targets.fiber.min),
    fiberMax: String(targets.fiber.max),
  });
  const setField = (k) => (v) => setForm(p => ({ ...p, [k]: typeof v === 'string' ? v : String(v) }));

  const parsed = {
    protein:        parseFloat(form.protein),
    caloriesTarget: parseFloat(form.caloriesTarget),
    caloriesFloor:  parseFloat(form.caloriesFloor),
    fatMin:   parseFloat(form.fatMin),
    fatMax:   parseFloat(form.fatMax),
    carbsMin: parseFloat(form.carbsMin),
    carbsMax: parseFloat(form.carbsMax),
    fiberMin: parseFloat(form.fiberMin),
    fiberMax: parseFloat(form.fiberMax),
  };

  // Per-field errors
  const fieldErrors = {};
  const posCheck = (k, label) => {
    if (!Number.isFinite(parsed[k]) || parsed[k] <= 0) fieldErrors[k] = `${label} must be > 0`;
  };
  posCheck('protein', 'Protein');
  posCheck('caloriesTarget', 'Target');
  posCheck('caloriesFloor', 'Floor');
  posCheck('fatMin', 'Min'); posCheck('fatMax', 'Max');
  posCheck('carbsMin', 'Min'); posCheck('carbsMax', 'Max');
  posCheck('fiberMin', 'Min'); posCheck('fiberMax', 'Max');

  if (Number.isFinite(parsed.caloriesTarget) && Number.isFinite(parsed.caloriesFloor) && parsed.caloriesTarget < parsed.caloriesFloor) {
    fieldErrors.caloriesTarget = fieldErrors.caloriesTarget || 'Must be ≥ floor';
  }
  if (Number.isFinite(parsed.fatMin) && Number.isFinite(parsed.fatMax) && parsed.fatMax < parsed.fatMin) {
    fieldErrors.fatRange = 'Max must be ≥ min';
  }
  if (Number.isFinite(parsed.carbsMin) && Number.isFinite(parsed.carbsMax) && parsed.carbsMax < parsed.carbsMin) {
    fieldErrors.carbsRange = 'Max must be ≥ min';
  }
  if (Number.isFinite(parsed.fiberMin) && Number.isFinite(parsed.fiberMax) && parsed.fiberMax < parsed.fiberMin) {
    fieldErrors.fiberRange = 'Max must be ≥ min';
  }
  const hasErrors = Object.keys(fieldErrors).length > 0;

  const ratio = (Number.isFinite(parsed.protein) && Number.isFinite(parsed.caloriesTarget) && parsed.caloriesTarget > 0)
    ? (parsed.protein / parsed.caloriesTarget) * 100
    : null;
  const baseRatio = (targets.protein / targets.caloriesTarget) * 100;
  const ratioDelta = ratio != null ? ratio - baseRatio : 0;

  // Auto-save (debounced)
  const [saveState, setSaveState] = useState('idle'); // idle | saving | saved
  const saveTimer = useRef(null);
  const lastSerialized = useRef(null);

  useEffect(() => {
    if (hasErrors) return;
    const next = {
      protein:        parsed.protein,
      caloriesTarget: parsed.caloriesTarget,
      caloriesFloor:  parsed.caloriesFloor,
      fat:   { min: parsed.fatMin,   max: parsed.fatMax },
      carbs: { min: parsed.carbsMin, max: parsed.carbsMax },
      fiber: { min: parsed.fiberMin, max: parsed.fiberMax },
    };
    const ser = JSON.stringify(next);
    if (ser === JSON.stringify(targets)) return;
    if (ser === lastSerialized.current) return;
    lastSerialized.current = ser;
    setSaveState('saving');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave(next);
      setSaveState('saved');
      setTimeout(() => setSaveState((s) => s === 'saved' ? 'idle' : s), 1400);
    }, 380);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
    // eslint-disable-next-line
  }, [form, hasErrors]);

  const reset = () => {
    if (!window.confirm('Reset all targets to defaults?')) return;
    onReset();
    setForm({
      protein: String(DEFAULT_TARGETS.protein),
      caloriesTarget: String(DEFAULT_TARGETS.caloriesTarget),
      caloriesFloor: String(DEFAULT_TARGETS.caloriesFloor),
      fatMin: String(DEFAULT_TARGETS.fat.min),
      fatMax: String(DEFAULT_TARGETS.fat.max),
      carbsMin: String(DEFAULT_TARGETS.carbs.min),
      carbsMax: String(DEFAULT_TARGETS.carbs.max),
      fiberMin: String(DEFAULT_TARGETS.fiber.min),
      fiberMax: String(DEFAULT_TARGETS.fiber.max),
    });
  };

  // Live preview math (uses draft parsed targets where valid, else current)
  const eff = {
    protein: Number.isFinite(parsed.protein) && parsed.protein > 0 ? parsed.protein : targets.protein,
    target:  Number.isFinite(parsed.caloriesTarget) && parsed.caloriesTarget > 0 ? parsed.caloriesTarget : targets.caloriesTarget,
    floor:   Number.isFinite(parsed.caloriesFloor) && parsed.caloriesFloor > 0 ? parsed.caloriesFloor : targets.caloriesFloor,
  };
  const proteinPct = Math.min(100, (totals.p / eff.protein) * 100);
  const proteinColor = totals.p >= eff.protein ? 'good' : (totals.p / eff.protein > 0.7 ? 'warn' : 'bad');
  const kcalPct = Math.min(100, (totals.kcal / eff.target) * 100);
  const kcalColor = totals.kcal >= eff.target ? 'good' : (totals.kcal >= eff.floor ? 'warn' : 'bad');
  const floorPct = Math.min(100, (eff.floor / eff.target) * 100);

  return (
    <>
      <div className="sheet-backdrop" onClick={onClose} />
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-handle" />
        <div className="sheet-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div className="sheet-title">Edit targets</div>
            <span className={`saved-pill ${saveState !== 'idle' ? 'visible' : ''} ${saveState === 'saving' ? 'idle' : ''}`}>
              {saveState === 'saving' ? (
                <>SAVING</>
              ) : saveState === 'saved' ? (
                <><svg className="tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5"><path d="M20 6L9 17l-5-5"/></svg> SAVED</>
              ) : null}
            </span>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="settings-preview">
          <div className="settings-preview-head">
            <span className="settings-preview-eyebrow">Today against draft targets</span>
            <span className="settings-preview-meta">live</span>
          </div>
          <div className="settings-preview-rows">
            <div className="sp-row">
              <span className="sp-row-lbl">Protein</span>
              <div className="sp-row-bar">
                <div className={`sp-row-fill ${proteinColor}`} style={{ width: `${proteinPct}%` }} />
              </div>
              <span className="sp-row-val">{Math.round(totals.p)}<span className="target">/{Math.round(eff.protein)}g</span></span>
            </div>
            <div className="sp-row">
              <span className="sp-row-lbl">Calories</span>
              <div className="sp-row-bar">
                <div className={`sp-row-fill ${kcalColor}`} style={{ width: `${kcalPct}%` }} />
                {eff.floor < eff.target && <div className="sp-row-floor" style={{ left: `${floorPct}%` }} />}
              </div>
              <span className="sp-row-val">{Math.round(totals.kcal)}<span className="target">/{Math.round(eff.target)}</span></span>
            </div>
            <div className="sp-row">
              <span className="sp-row-lbl">Ratio</span>
              <div className="sp-row-bar">
                <div className="sp-row-fill" style={{ width: `${Math.min(100, (ratio || 0) * 6)}%`, background: 'var(--ink-2)' }} />
              </div>
              <span className="sp-row-val">{ratio != null ? ratio.toFixed(1) : '—'}<span className="target">g/100kcal</span></span>
            </div>
          </div>
        </div>

        <div className="sheet-body" style={{ padding: 0 }}>
          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Protein & calories</span>
              {ratio != null && (
                <span className="settings-section-meta mono">
                  <span className={`delta ${ratioDelta > 0.3 ? 'good' : ratioDelta < -0.3 ? 'bad' : ''}`} style={{ color: ratioDelta > 0.3 ? 'var(--good)' : ratioDelta < -0.3 ? 'var(--bad)' : 'var(--muted)' }}>
                    {ratio.toFixed(1)} g/100kcal
                  </span>
                </span>
              )}
            </div>
            <div className="settings-section-help">Daily protein goal, calorie target, and the floor below which the app warns about undereating.</div>
            <div className="pc-grid">
              <NumField label="Protein" unit="g" value={form.protein} onChange={setField('protein')} error={fieldErrors.protein} min="1" />
              <NumField label="Target" unit="kcal" value={form.caloriesTarget} onChange={setField('caloriesTarget')} error={fieldErrors.caloriesTarget} min="1" step="50" />
              <NumField label="Floor" unit="kcal" value={form.caloriesFloor} onChange={setField('caloriesFloor')} error={fieldErrors.caloriesFloor} min="1" step="50" />
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Fat</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.fatMin}
              maxVal={form.fatMax}
              onMinChange={setField('fatMin')}
              onMaxChange={setField('fatMax')}
              sliderMin={20}
              sliderMax={150}
              error={fieldErrors.fatRange || fieldErrors.fatMin || fieldErrors.fatMax}
              context={<>Below <strong>{form.fatMin || '–'}g</strong> triggers low-fat warnings; above <strong>{form.fatMax || '–'}g</strong> counts as over.</>}
            />
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Carbs</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.carbsMin}
              maxVal={form.carbsMax}
              onMinChange={setField('carbsMin')}
              onMaxChange={setField('carbsMax')}
              sliderMin={50}
              sliderMax={400}
              error={fieldErrors.carbsRange || fieldErrors.carbsMin || fieldErrors.carbsMax}
              context={<>Pace nudges trigger when carbs trail this band.</>}
            />
          </div>

          <div className="settings-section">
            <div className="settings-section-head">
              <span className="settings-section-title">Fiber</span>
              <span className="settings-section-meta">macro band</span>
            </div>
            <RangePair
              name="Range"
              unit="g"
              minVal={form.fiberMin}
              maxVal={form.fiberMax}
              onMinChange={setField('fiberMin')}
              onMaxChange={setField('fiberMax')}
              sliderMin={5}
              sliderMax={60}
              error={fieldErrors.fiberRange || fieldErrors.fiberMin || fieldErrors.fiberMax}
              context={<>Daily fiber target band.</>}
            />
          </div>

          <div className="settings-foot">
            <button className="ghost-btn" onClick={reset}>Reset to defaults</button>
            <span className="settings-section-meta mono" style={{ fontSize: 10 }}>
              {hasErrors ? <span style={{ color: 'var(--bad)' }}>FIX ERRORS TO SAVE</span> : 'AUTO-SAVE ON'}
            </span>
          </div>
        </div>
      </div>
    </>
  );
}

function DaySummary({ totals }) {
  const targets = useContext(TargetsContext);
  const rows = [
    { label: 'Calories', val: `${Math.round(totals.kcal)}`, target: `≥${targets.caloriesFloor.toLocaleString()}`, pass: totals.kcal >= targets.caloriesFloor },
    { label: 'Protein',  val: `${Math.round(totals.p)}g`,    target: `≥${targets.protein}g`,                       pass: totals.p >= targets.protein },
    { label: 'Fat',      val: `${Math.round(totals.f)}g`,    target: `≥${targets.fat.min}g`,                       pass: totals.f >= targets.fat.min },
    { label: 'Carbs',    val: `${Math.round(totals.c)}g`,    target: `≥${targets.carbs.min}g`,                     pass: totals.c >= targets.carbs.min },
    { label: 'Fiber',    val: `${Math.round(totals.fiber)}g`,target: `≥${targets.fiber.min}g`,                     pass: totals.fiber >= targets.fiber.min },
  ];
  return (
    <div className="card" style={{ marginTop: 10 }}>
      <div className="card-head">
        <span className="eyebrow">Day summary</span>
      </div>
      <div className="card-divider" />
      <div className="summary-rows">
        {rows.map(r => (
          <div key={r.label} className="sum-row">
            <span className="sum-name">{r.label}</span>
            <span className="sum-val mono">{r.val}</span>
            <span className="sum-target mono">{r.target}</span>
            <span className={`sum-state ${r.pass ? 'pass' : 'fail'}`} aria-label={r.pass ? 'pass' : 'fail'}>
              {r.pass ? (
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
              ) : (
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
              )}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ArchitectureGuidance() {
  const targets = useContext(TargetsContext);
  const items = [
    { n: '01', label: 'Protein anchor', meta: '~550 kcal · 60g P', detail: 'shake' },
    { n: '02', label: 'Protein meal',   meta: '400–600 kcal · 40–60g P', detail: 'chicken, fish, eggs, kebabs' },
    { n: '03', label: 'Balance meal',   meta: '~400–500 kcal · 15–20g P', detail: 'rice + legumes, beans + rice, vegetables + bread' },
    { n: '04', label: 'Snacks/extras',  meta: 'fill remaining', detail: 'chocolate milk, fruit, nuts, Greek yogurt' },
  ];
  return (
    <div className="card" style={{ marginTop: 10 }}>
      <div className="empty-state">
        <h3>Day architecture</h3>
        <p>2–3 protein-dense meals do the heavy lifting. 1–2 carb/fiber/fat-forward meals fill calories to {targets.caloriesTarget.toLocaleString()} and cover floors. Build today around this shape.</p>
        <div className="arch-list">
          {items.map(it => (
            <div key={it.n} className="arch-item">
              <span className="arch-num">{it.n}</span>
              <span className="arch-text"><strong>{it.label}</strong> — {it.detail}</span>
              <span className="arch-meta">{it.meta}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
