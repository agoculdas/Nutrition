<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <title>Nutrition</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nutrition" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0B;
      --surface: #101013;
      --surface-2: #16161A;
      --hairline: #1F1F23;
      --hairline-strong: #2A2A30;
      --ink: #EDEDEF;
      --ink-2: #B8B8BE;
      --muted: #6E6E76;
      --dim: #4A4A52;

      --good: oklch(0.82 0.16 145);
      --good-bg: oklch(0.32 0.07 145 / 0.18);
      --good-line: oklch(0.45 0.10 145 / 0.5);

      --warn: oklch(0.80 0.14 78);
      --warn-bg: oklch(0.32 0.07 78 / 0.18);
      --warn-line: oklch(0.45 0.10 78 / 0.5);

      --bad: oklch(0.68 0.22 25);
      --bad-bg: oklch(0.32 0.10 25 / 0.22);
      --bad-line: oklch(0.45 0.14 25 / 0.5);

      --info: oklch(0.78 0.10 245);
      --info-bg: oklch(0.32 0.05 245 / 0.20);
      --info-line: oklch(0.45 0.08 245 / 0.5);

      --radius: 10px;
      --radius-sm: 6px;
      --shadow-sheet: 0 -8px 32px rgba(0,0,0,0.5);

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }

    html { background: var(--bg); }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01', 'zero' 0;
      line-height: 1.4;
      min-height: 100vh;
    }

    .app-shell {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 16px 140px;
      min-height: 100vh;
    }
    @media (min-width: 720px) {
      .app-shell { max-width: 560px; padding: 0 20px 140px; }
    }

    /* Mono utility */
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }
    .tracking-tight { letter-spacing: -0.02em; }
    .tracking-tighter { letter-spacing: -0.04em; }

    /* Section eyebrow */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Header */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, var(--bg) 70%, transparent);
      padding: 14px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }
    .topbar-mark {
      width: 14px; height: 16px;
      flex-shrink: 0;
      align-self: center;
      color: var(--ink);
    }
    .topbar-mark svg { width: 100%; height: 100%; display: block; }
    .topbar-h {
      font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    }
    .topbar-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .pace-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px 5px 8px;
      border: 1px solid var(--hairline-strong);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      background: var(--surface);
    }
    .pace-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
    }
    .pace-pill.good .dot { background: var(--good); box-shadow: 0 0 0 3px var(--good-bg); }
    .pace-pill.warn .dot { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-bg); }
    .pace-pill.bad .dot { background: var(--bad); box-shadow: 0 0 0 3px var(--bad-bg); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card + .card { margin-top: 10px; }
    .card-pad { padding: 14px 14px; }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px 10px;
    }
    .card-divider { height: 1px; background: var(--hairline); }

    /* HERO */
    .hero {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 0;
      margin-bottom: 10px;
    }
    .hero-col { padding: 0 4px; }
    .hero-col + .hero-divider { background: var(--hairline); }
    .hero-divider { background: var(--hairline); }
    .hero-label-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .hero-label {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-status {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .hero-status.good { color: var(--good); }
    .hero-status.warn { color: var(--warn); }
    .hero-status.bad  { color: var(--bad);  }

    .hero-num {
      font-family: var(--font-mono);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.045em;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    @media (min-width: 380px) {
      .hero-num { font-size: 50px; }
    }
    .hero-num .unit {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0;
    }
    .hero-num .target {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
    }
    .hero-rail {
      height: 3px;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
      position: relative;
    }
    .hero-rail-fill {
      height: 100%;
      background: var(--ink);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hero-rail-fill.good { background: var(--good); }
    .hero-rail-fill.warn { background: var(--warn); }
    .hero-rail-fill.bad  { background: var(--bad);  }
    .hero-foot {
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink-2);
      letter-spacing: -0.005em;
    }
    .hero-foot .num { color: var(--ink); font-weight: 500; }
    .hero-foot .arrow { color: var(--dim); margin: 0 4px; }

    /* Implied ratio inline strip */
    .ratio-strip {
      margin-top: 4px;
      padding: 11px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
    }
    .ratio-strip.good { border-color: var(--good-line); background: var(--good-bg); }
    .ratio-strip.warn { border-color: var(--warn-line); background: var(--warn-bg); }
    .ratio-strip.bad  { border-color: var(--bad-line);  background: var(--bad-bg);  }
    .ratio-strip.info { border-color: var(--info-line); background: var(--info-bg); }
    .ratio-left { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
    .ratio-left strong { color: var(--ink); font-family: var(--font-mono); font-weight: 600; }
    .ratio-num {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--ink);
      flex-shrink: 0;
      line-height: 1;
    }
    .ratio-num.good { color: var(--good); }
    .ratio-num.warn { color: var(--warn); }
    .ratio-num.bad  { color: var(--bad);  }
    .ratio-num .unit { font-size: 10px; color: var(--muted); margin-left: 2px; letter-spacing: 0; }

    /* Day pace strip */
    .pace-strip {
      margin-top: 10px;
      padding: 12px 14px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .pace-strip-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .pace-strip-delta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .pace-strip-delta .num { color: var(--ink); }
    .pace-strip-delta.good .num { color: var(--good); }
    .pace-strip-delta.warn .num { color: var(--warn); }
    .pace-strip-delta.bad  .num { color: var(--bad); }

    .pace-rows {
      display: grid;
      grid-template-columns: 60px 1fr 56px;
      column-gap: 10px;
      row-gap: 8px;
      align-items: center;
    }
    .pace-row-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pace-row-bar {
      position: relative;
      height: 6px;
      background: var(--hairline-strong);
      border-radius: 2px;
      overflow: hidden;
    }
    .pace-row-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .pace-row-fill.actual.good { background: var(--good); }
    .pace-row-fill.actual.warn { background: var(--warn); }
    .pace-row-fill.actual.bad  { background: var(--bad);  }
    .pace-row-fill.actual.neutral { background: var(--ink-2); }
    .pace-row-val {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink);
      text-align: right;
      letter-spacing: -0.005em;
    }

    /* Time axis row */
    .pace-axis-wrap {
      position: relative;
      height: 18px;
      margin-top: 2px;
    }
    .pace-axis-line {
      position: absolute;
      left: 0; right: 0; top: 4px;
      height: 1px;
      background: var(--hairline-strong);
    }
    .pace-axis-tick {
      position: absolute;
      top: 1px;
      width: 1px;
      height: 6px;
      background: var(--hairline-strong);
      transform: translateX(-0.5px);
    }
    .pace-axis-label {
      position: absolute;
      top: 9px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--dim);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .pace-now-marker {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 12px;
      background: var(--ink);
      border-radius: 1px;
      transform: translateX(-1px);
      box-shadow: 0 0 0 3px var(--surface);
    }
    .pace-now-label {
      position: absolute;
      top: -16px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--ink);
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding: 1px 4px;
      background: var(--surface);
      border-radius: 3px;
    }
    .pace-foot {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--hairline);
      font-size: 11.5px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .pace-foot .accent.good { color: var(--good); }
    .pace-foot .accent.warn { color: var(--warn); }
    .pace-foot .accent.bad  { color: var(--bad); }
    .pace-foot .num { font-family: var(--font-mono); color: var(--ink); }

    /* Macro budget table */
    .budget-table {
      display: grid;
      grid-template-columns: 60px 1fr 70px 70px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .budget-table > div {
      padding: 10px 14px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
    }
    .budget-table > div:nth-child(-n+4) {
      padding-top: 8px; padding-bottom: 8px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--surface-2);
    }
    .budget-table > div:nth-last-child(-n+4) { border-bottom: none; }
    .budget-name { color: var(--ink); font-family: var(--font-sans); font-weight: 500; font-size: 13px; }
    .budget-bar {
      position: relative;
      height: 3px;
      width: 100%;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin-right: 12px;
      overflow: hidden;
    }
    .budget-bar-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .budget-bar-fill.good { background: var(--good); }
    .budget-bar-fill.warn { background: var(--warn); }
    .budget-bar-fill.bad  { background: var(--bad);  }
    .budget-bar-fill.dim  { background: var(--dim);  }
    .budget-have { color: var(--ink); justify-content: flex-end; }
    .budget-remain { color: var(--muted); justify-content: flex-end; }
    .budget-remain.alert { color: var(--bad); }
    .budget-table > .budget-bar-cell { padding-right: 0; }

    /* Chart card */
    .chart-card { padding: 14px 14px 12px; }
    .chart-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .chart-cap {
      margin-top: 6px;
      font-size: 11.5px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .chart-cap .num { font-family: var(--font-mono); color: var(--ink); }
    .chart-cap .accent.good { color: var(--good); }
    .chart-cap .accent.warn { color: var(--warn); }
    .chart-cap .accent.bad  { color: var(--bad);  }

    /* Nudges */
    .nudge {
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--hairline);
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--ink-2);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .nudge + .nudge { margin-top: 6px; }
    .nudge-glyph {
      width: 4px; align-self: stretch; border-radius: 2px;
      background: var(--muted);
      flex-shrink: 0;
      min-height: 16px;
    }
    .nudge.bad  .nudge-glyph { background: var(--bad);  }
    .nudge.warn .nudge-glyph { background: var(--warn); }
    .nudge.info .nudge-glyph { background: var(--info); }
    .nudge.good .nudge-glyph { background: var(--good); }
    .nudge.bad  { border-color: var(--bad-line);  background: var(--bad-bg); color: var(--ink); }
    .nudge.warn { border-color: var(--warn-line); background: var(--warn-bg); color: var(--ink); }
    .nudge.info { border-color: var(--info-line); background: var(--info-bg); color: var(--ink); }
    .nudge.good { border-color: var(--good-line); background: var(--good-bg); color: var(--ink); }
    .nudge-text strong { font-weight: 600; color: var(--ink); }

    /* Meal list */
    .meal {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-bottom: 1px solid var(--hairline);
      align-items: start;
      animation: meal-in 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes meal-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .meal:last-child { border-bottom: none; }
    .meal-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .role-tag {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--hairline-strong);
      color: var(--muted);
    }
    .role-tag.anchor { color: var(--good); border-color: var(--good-line); }
    .role-tag.balanced { color: var(--info); border-color: var(--info-line); }
    .role-tag.filler { color: var(--warn); border-color: var(--warn-line); }
    .meal-macros {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: -0.005em;
    }
    .meal-macros .sep { color: var(--dim); margin: 0 5px; }
    .meal-macros .pp { color: var(--ink-2); }
    .fiber-flag {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px; padding: 2px 6px;
      border-radius: 3px;
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid var(--warn-line);
    }
    .meal-actions {
      display: flex; gap: 0;
      align-self: start;
    }
    .icon-btn {
      width: 30px; height: 30px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover, .icon-btn:active { background: var(--hairline); color: var(--ink); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* FAB / sticky add */
    .fab-wrap {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 0 16px 18px;
      display: flex; justify-content: center;
      pointer-events: none;
      z-index: 30;
      background: linear-gradient(180deg, transparent, var(--bg) 50%);
      padding-top: 28px;
    }
    .fab {
      pointer-events: auto;
      width: 100%;
      max-width: 428px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06) inset;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .fab:active { transform: scale(0.985); }
    .fab svg { width: 16px; height: 16px; }
    @media (min-width: 720px) { .fab { max-width: 528px; } }

    /* Sheet */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      z-index: 40;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--hairline-strong);
      border-radius: 16px 16px 0 0;
      max-height: 86vh;
      overflow-y: auto;
      z-index: 41;
      animation: sheet-up 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sheet);
    }
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--hairline-strong);
      border-radius: 2px;
      margin: 8px auto 0;
    }
    .sheet-head {
      padding: 10px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--hairline);
      position: sticky; top: 0;
      background: var(--surface);
      z-index: 2;
    }
    .sheet-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .sheet-tabs {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 7px;
      padding: 2px;
      gap: 0;
    }
    .sheet-tab {
      padding: 5px 11px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 5px;
    }
    .sheet-tab.active { background: var(--surface); color: var(--ink); box-shadow: 0 0 0 1px var(--hairline-strong); }
    .sheet-body { padding: 12px 16px 24px; }

    .sheet-section + .sheet-section { margin-top: 18px; }
    .sheet-section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .sheet-section-title {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sheet-section-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* Visual food cards */
    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (min-width: 380px) {
      .food-grid { grid-template-columns: 1fr 1fr; }
    }
    .food-card {
      text-align: left;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 10px 11px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 92px;
      position: relative;
      transition: border-color 0.15s, transform 0.12s, background 0.15s;
      font-family: var(--font-sans);
      color: var(--ink);
    }
    .food-card:hover { border-color: var(--hairline-strong); }
    .food-card:active { transform: scale(0.98); background: var(--surface); }
    .food-card-name {
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--ink);
      flex: 1;
    }
    .food-card-meta {
      display: flex;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: -0.005em;
      align-items: baseline;
    }
    .food-card-meta .kcal { color: var(--ink); font-weight: 500; }
    .food-card-meta .sep { color: var(--dim); }
    .food-card-meta .pp { color: var(--ink-2); }
    .food-card-pp {
      position: absolute;
      top: 9px; right: 10px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.04em;
      padding: 2px 5px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--hairline-strong);
    }
    .food-card-pp.anchor { color: var(--good); border-color: var(--good-line); background: var(--good-bg); }
    .food-card-pp.balanced { color: var(--info); border-color: var(--info-line); background: var(--info-bg); }
    .food-card-pp.filler { color: var(--warn); border-color: var(--warn-line); background: var(--warn-bg); }

    /* Saved chips row */
    .saved-row {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .saved-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      font-family: var(--font-sans);
    }
    .saved-chip:hover { border-color: var(--hairline-strong); }
    .saved-chip .kcal {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
    }
    .saved-empty { font-size: 12px; color: var(--muted); padding: 4px 0; }

    /* Custom form */
    .custom-form input {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      color: var(--ink);
      padding: 11px 12px;
      border-radius: 8px;
      width: 100%;
      font-family: var(--font-sans);
      font-size: 14px;
    }
    .custom-form input.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .custom-form input::placeholder { color: var(--dim); }
    .custom-form input:focus { outline: none; border-color: var(--hairline-strong); background: var(--surface); }
    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .input-with-label {
      position: relative;
    }
    .input-with-label .lbl {
      position: absolute;
      top: 8px; left: 12px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      pointer-events: none;
    }
    .input-with-label input { padding-top: 22px; padding-bottom: 8px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      width: 100%;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(0.99); }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--hairline-strong);
    }
    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .form-actions.single { grid-template-columns: 1fr; }

    /* Day summary */
    .summary-rows { padding: 4px 0; }
    .sum-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--hairline);
      font-size: 13px;
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-name { color: var(--ink); font-weight: 500; }
    .sum-val {
      font-family: var(--font-mono);
      font-size: 13.5px;
      color: var(--ink);
      letter-spacing: -0.01em;
      min-width: 58px;
      text-align: right;
    }
    .sum-target {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      min-width: 76px;
      text-align: right;
    }
    .sum-state {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .sum-state.pass { background: var(--good-bg); color: var(--good); border: 1px solid var(--good-line); }
    .sum-state.fail { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad-line); }

    /* Empty / first-run */
    .empty-state {
      padding: 22px 16px 18px;
      text-align: left;
    }
    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.015em;
    }
    .empty-state p {
      font-size: 13px;
      color: var(--ink-2);
      margin: 0 0 14px;
      line-height: 1.55;
    }
    .arch-list {
      display: grid; gap: 8px;
      margin-top: 10px;
    }
    .arch-item {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      align-items: center;
    }
    .arch-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .arch-text { font-size: 12.5px; color: var(--ink); }
    .arch-text strong { font-weight: 600; }
    .arch-meta {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
    }

    /* Meals card head with action */
    .card-head .right-actions { display: flex; gap: 6px; }
    .ghost-btn {
      background: transparent;
      border: 1px solid var(--hairline);
      color: var(--muted);
      padding: 5px 9px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .ghost-btn:hover { color: var(--ink); border-color: var(--hairline-strong); }

    /* Add ripple on add */
    @keyframes pulse-good {
      0% { box-shadow: 0 0 0 0 oklch(0.82 0.16 145 / 0.5); }
      100% { box-shadow: 0 0 0 18px oklch(0.82 0.16 145 / 0); }
    }
    .pulse-good { animation: pulse-good 0.6s ease-out; }

    /* Number flash */
    @keyframes num-flash {
      0% { color: var(--good); }
      100% { color: var(--ink); }
    }
    .num-flash { animation: num-flash 0.7s ease-out; }

    /* Chart */
    .chart-svg { width: 100%; height: auto; display: block; }

    /* utility responsive padding for desktop */
    @media (min-width: 720px) {
      .hero-num { font-size: 56px; }
    }

    /* === Settings sheet polish === */
    .gear-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid var(--hairline);
      color: var(--ink-2);
      cursor: pointer;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .gear-btn:hover { background: var(--surface-2); color: var(--ink); border-color: var(--hairline-strong); }
    .gear-btn:hover svg { transform: translateY(-1px); }
    .gear-btn:active { transform: scale(0.94); }
    .gear-btn svg { width: 15px; height: 15px; transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1); }

    /* Saved pill */
    .saved-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 7px;
      border-radius: 999px;
      background: var(--good-bg);
      border: 1px solid var(--good-line);
      color: var(--good);
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }
    .saved-pill.visible { opacity: 1; transform: translateY(0); }
    .saved-pill .tick {
      width: 8px; height: 8px;
    }
    .saved-pill.idle {
      background: transparent;
      border-color: var(--hairline);
      color: var(--muted);
    }

    /* Settings preview at top of sheet */
    .settings-preview {
      padding: 14px 16px 12px;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-bottom: 1px solid var(--hairline);
    }
    .settings-preview-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
    }
    .settings-preview-eyebrow {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-preview-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }
    .settings-preview-rows {
      display: grid;
      gap: 9px;
    }
    .sp-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .sp-row-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sp-row-bar {
      position: relative;
      height: 5px;
      background: var(--hairline-strong);
      border-radius: 2px;
      overflow: visible;
    }
    .sp-row-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 2px;
      background: var(--ink-2);
      transition: width 0.32s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s;
    }
    .sp-row-fill.good { background: var(--good); }
    .sp-row-fill.warn { background: var(--warn); }
    .sp-row-fill.bad  { background: var(--bad);  }
    .sp-row-floor {
      position: absolute;
      top: -2px; bottom: -2px;
      width: 1px;
      background: var(--muted);
      transition: left 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sp-row-floor::after {
      content: 'FLOOR';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--dim);
      white-space: nowrap;
    }
    .sp-row-val {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink);
      text-align: right;
      letter-spacing: -0.005em;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .sp-row-val .target { color: var(--muted); }
    .sp-row-val.flash { color: var(--good); }

    /* Premium field */
    .field {
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .field-shell {
      position: relative;
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 10px 12px 8px;
      transition: border-color 0.16s, background 0.16s, box-shadow 0.16s;
    }
    .field-shell:focus-within {
      border-color: var(--hairline-strong);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.025);
    }
    .field-shell.error {
      border-color: var(--bad-line);
      background: var(--bad-bg);
    }
    .field-shell.error:focus-within {
      box-shadow: 0 0 0 3px oklch(0.45 0.14 25 / 0.25);
    }
    .field-lbl {
      display: block;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }
    .field-shell.error .field-lbl { color: var(--bad); }
    .field-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .field-input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      width: 100%;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--ink);
      line-height: 1.1;
      min-width: 0;
      /* hide native spinners */
      -moz-appearance: textfield;
    }
    .field-input::-webkit-outer-spin-button,
    .field-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .field-input::placeholder { color: var(--dim); }
    .field-unit {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .field-error {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.02em;
      color: var(--bad);
      margin-top: 6px;
      padding-left: 2px;
      animation: field-err-in 0.18s ease;
    }
    @keyframes field-err-in {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Range pair: min/max with shared rail visualization */
    .range-pair {
      background: var(--surface-2);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 12px 14px 14px;
      transition: border-color 0.16s;
    }
    .range-pair:focus-within { border-color: var(--hairline-strong); background: var(--surface); }
    .range-pair.error { border-color: var(--bad-line); background: var(--bad-bg); }
    .range-pair-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 12px;
    }
    .range-pair-name {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      font-weight: 500;
    }
    .range-pair.error .range-pair-name { color: var(--bad); }
    .range-pair-readout {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .range-pair-readout .sep { color: var(--dim); margin: 0 6px; }
    .range-pair-readout .unit { color: var(--muted); font-size: 11px; margin-left: 3px; }
    .range-rail-wrap {
      position: relative;
      height: 26px;
      margin: 0 8px 6px;
    }
    .range-rail {
      position: absolute;
      left: 0; right: 0; top: 11px;
      height: 4px;
      background: var(--hairline-strong);
      border-radius: 2px;
    }
    .range-rail-fill {
      position: absolute;
      top: 11px;
      height: 4px;
      background: var(--ink-2);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .range-pair.error .range-rail-fill { background: var(--bad); }
    .range-input {
      position: absolute;
      left: -8px; right: -8px;
      width: calc(100% + 16px);
      top: 0;
      height: 26px;
      background: transparent;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    .range-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      pointer-events: auto;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--hairline-strong);
      cursor: grab;
      transition: transform 0.12s ease;
    }
    .range-input::-webkit-slider-thumb:hover { transform: scale(1.12); }
    .range-input::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.18); }
    .range-input::-moz-range-thumb {
      pointer-events: auto;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--hairline-strong);
      cursor: grab;
    }
    .range-input::-webkit-slider-runnable-track { background: transparent; height: 26px; }
    .range-input::-moz-range-track { background: transparent; height: 26px; }
    .range-pair.error .range-input::-webkit-slider-thumb {
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), 0 0 0 1px var(--bad-line);
    }
    .range-pair-axis {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.06em;
      padding: 0 8px;
      margin-top: -2px;
    }
    .range-pair-context {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }
    .range-pair-context strong { color: var(--ink-2); font-weight: 500; }

    /* Section spacing inside settings */
    .settings-section {
      padding: 16px 16px 4px;
      border-bottom: 1px solid var(--hairline);
    }
    .settings-section:last-child { border-bottom: none; }
    .settings-section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 10px;
    }
    .settings-section-title {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .settings-section-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .settings-section-meta .delta {
      transition: color 0.2s;
    }
    .settings-section-help {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
      margin: -2px 0 12px;
    }
    .pc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .settings-foot {
      padding: 14px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--hairline);
    }
    .settings-foot .ghost-btn { padding: 8px 12px; font-size: 11px; }

    /* hide scroll bg leak */
    @supports (-webkit-touch-callout: none) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback, useRef, useContext } = React;

const DEFAULT_TARGETS = {
  protein: 170,
  caloriesTarget: 2200,
  caloriesFloor: 1800,
  fat: { min: 70, max: 80 },
  carbs: { min: 180, max: 220 },
  fiber: { min: 25, max: 30 },
};

const TargetsContext = React.createContext(DEFAULT_TARGETS);

function mergeTargets(loaded) {
  if (!loaded || typeof loaded !== 'object') return DEFAULT_TARGETS;
  return {
    protein:        Number.isFinite(+loaded.protein)        ? +loaded.protein        : DEFAULT_TARGETS.protein,
    caloriesTarget: Number.isFinite(+loaded.caloriesTarget) ? +loaded.caloriesTarget : DEFAULT_TARGETS.caloriesTarget,
    caloriesFloor:  Number.isFinite(+loaded.caloriesFloor)  ? +loaded.caloriesFloor  : DEFAULT_TARGETS.caloriesFloor,
    fat:   { min: Number.isFinite(+loaded?.fat?.min)   ? +loaded.fat.min   : DEFAULT_TARGETS.fat.min,
             max: Number.isFinite(+loaded?.fat?.max)   ? +loaded.fat.max   : DEFAULT_TARGETS.fat.max },
    carbs: { min: Number.isFinite(+loaded?.carbs?.min) ? +loaded.carbs.min : DEFAULT_TARGETS.carbs.min,
             max: Number.isFinite(+loaded?.carbs?.max) ? +loaded.carbs.max : DEFAULT_TARGETS.carbs.max },
    fiber: { min: Number.isFinite(+loaded?.fiber?.min) ? +loaded.fiber.min : DEFAULT_TARGETS.fiber.min,
             max: Number.isFinite(+loaded?.fiber?.max) ? +loaded.fiber.max : DEFAULT_TARGETS.fiber.max },
  };
}

const storage = {
  async get(key) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.getItem === 'function') {
      try { return await window.storage.getItem(key); } catch (e) {}
    }
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  async set(key, value) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.setItem === 'function') {
      try { await window.storage.setItem(key, value); return; } catch (e) {}
    }
    try { localStorage.setItem(key, value); } catch (e) {}
  },
};

function dateKey(d = new Date()) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `log:${yyyy}-${mm}-${dd}`;
}

function formatToday() {
  return new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function ppKc(meal) {
  return meal.kcal > 0 ? (meal.p / meal.kcal) * 100 : 0;
}

function ratioBand(ratio) {
  if (ratio == null) return 'info';
  if (ratio <= 8) return 'good';
  if (ratio <= 11) return 'warn';
  return 'bad';
}

function categoryFromPp(pp) {
  if (pp > 10) return 'anchor';
  if (pp >= 6) return 'balanced';
  return 'filler';
}

// Fraction of "active eating window" elapsed: 8am → 9pm (13h)
function dayPaceFraction(d = new Date()) {
  const start = 8;
  const end = 21;
  const hours = d.getHours() + d.getMinutes() / 60;
  if (hours < start) return 0;
  if (hours > end) return 1;
  return (hours - start) / (end - start);
}

function App() {
  const [meals, setMeals] = useState([]);
  const [savedMeals, setSavedMeals] = useState([]);
  const [activeKey, setActiveKey] = useState(dateKey());
  const [loaded, setLoaded] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [now, setNow] = useState(new Date());
  const [sheetOpen, setSheetOpen] = useState(false);
  const [sheetTab, setSheetTab] = useState('quick');
  const [recentlyAddedId, setRecentlyAddedId] = useState(null);
  const [targets, setTargets] = useState(DEFAULT_TARGETS);
  const [settingsOpen, setSettingsOpen] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const [mealsRaw, savedRaw, targetsRaw] = await Promise.all([
        storage.get(activeKey),
        storage.get('meals:saved'),
        storage.get('targets:v1'),
      ]);
      if (cancelled) return;
      try { setMeals(mealsRaw ? JSON.parse(mealsRaw) || [] : []); } catch (e) { setMeals([]); }
      try { setSavedMeals(savedRaw ? JSON.parse(savedRaw) || [] : []); } catch (e) { setSavedMeals([]); }
      try { setTargets(mergeTargets(targetsRaw ? JSON.parse(targetsRaw) : null)); } catch (e) { setTargets(DEFAULT_TARGETS); }
      setLoaded(true);
    })();
    return () => { cancelled = true; };
  }, [activeKey]);

  useEffect(() => {
    if (loaded) storage.set('targets:v1', JSON.stringify(targets));
  }, [targets, loaded]);

  useEffect(() => {
    if (loaded) storage.set(activeKey, JSON.stringify(meals));
  }, [meals, activeKey, loaded]);

  useEffect(() => {
    const id = setInterval(() => {
      const n = new Date();
      setNow(n);
      const k = dateKey(n);
      if (k !== activeKey) setActiveKey(k);
    }, 60000);
    return () => clearInterval(id);
  }, [activeKey]);

  // body scroll lock when sheet is open
  useEffect(() => {
    if (sheetOpen) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [sheetOpen]);

  const totals = useMemo(() => meals.reduce((acc, m) => ({
    kcal: acc.kcal + (Number(m.kcal) || 0),
    p:    acc.p    + (Number(m.p)    || 0),
    f:    acc.f    + (Number(m.f)    || 0),
    c:    acc.c    + (Number(m.c)    || 0),
    fiber: acc.fiber + (Number(m.fiber) || 0),
  }), { kcal: 0, p: 0, f: 0, c: 0, fiber: 0 }), [meals]);

  const proteinHit = totals.p >= targets.protein;
  const kcalHit = totals.kcal >= targets.caloriesTarget;
  const proteinRemaining = Math.max(0, targets.protein - totals.p);
  const kcalRemaining = Math.max(0, targets.caloriesTarget - totals.kcal);
  const impliedRatio = (!proteinHit && kcalRemaining > 0) ? (proteinRemaining / kcalRemaining) * 100 : null;

  const addMeal = useCallback((m) => {
    const id = Date.now() + Math.random();
    setMeals(prev => [...prev, { ...m, id, addedAt: new Date().toISOString() }]);
    setRecentlyAddedId(id);
    setTimeout(() => setRecentlyAddedId(null), 800);
  }, []);

  const removeMeal = useCallback((id) => {
    setMeals(prev => prev.filter(x => x.id !== id));
  }, []);

  const updateMeal = useCallback((id, patch) => {
    setMeals(prev => prev.map(x => x.id === id ? { ...x, ...patch } : x));
    setEditingId(null);
  }, []);

  const saveForQuickAdd = useCallback((m) => {
    const entry = { id: Date.now(), name: m.name, sub: m.sub, kcal: m.kcal, p: m.p, f: m.f, c: m.c, fiber: m.fiber };
    setSavedMeals(prev => {
      if (prev.some(x => x.name === entry.name && x.kcal === entry.kcal)) return prev;
      const next = [entry, ...prev];
      storage.set('meals:saved', JSON.stringify(next));
      return next;
    });
  }, []);

  const removeSaved = useCallback((id) => {
    setSavedMeals(prev => {
      const next = prev.filter(x => x.id !== id);
      storage.set('meals:saved', JSON.stringify(next));
      return next;
    });
  }, []);

  const clearToday = useCallback(() => {
    if (!window.confirm('Clear all meals logged today? Past days are preserved.')) return;
    setMeals([]);
  }, []);

  const warnings = useMemo(() => {
    const out = [];
    const hour = now.getHours();
    const allHit = totals.p >= targets.protein
      && totals.kcal >= targets.caloriesFloor
      && totals.f >= targets.fat.min
      && totals.c >= targets.carbs.min
      && totals.fiber >= targets.fiber.min;

    if (allHit) {
      out.push({ severity: 'good', msg: <><strong>All targets hit.</strong> You nailed it today.</> });
      return out;
    }
    if (meals.length === 0) return out;

    if (totals.kcal < targets.caloriesFloor) {
      if (hour >= 21) {
        out.push({ severity: 'bad', msg: <><strong>Below {targets.caloriesFloor.toLocaleString()} kcal floor</strong> — only {Math.round(totals.kcal)} logged. Persistent undereating on Mounjaro+Concerta risks lean mass loss. Eat now, even if not hungry.</> });
      } else if (hour >= 19) {
        out.push({ severity: 'bad', msg: <><strong>{Math.round(targets.caloriesFloor - totals.kcal)} kcal below the {targets.caloriesFloor.toLocaleString()} floor</strong> with ~{Math.max(1, 22 - hour)}h left. Stack chocolate milk + nuts + fruit immediately.</> });
      } else if (hour >= 17 && totals.kcal < targets.caloriesFloor - 300) {
        out.push({ severity: 'warn', msg: <><strong>Trending toward undershoot.</strong> {Math.round(totals.kcal)} kcal logged with {Math.max(0, 22 - hour)}h left. Plan a real dinner.</> });
      }
    }

    if (totals.kcal >= targets.caloriesFloor && totals.kcal < targets.caloriesTarget) {
      const need = targets.caloriesTarget - totals.kcal;
      out.push({ severity: 'info', msg: <><strong>{Math.round(need)} kcal to hit {targets.caloriesTarget.toLocaleString()}.</strong> {need > 500 ? 'Plan a carb/fat-forward meal: rice + legumes, beans + rice, vegetables + bread.' : 'A snack or two closes it: chocolate milk, nuts, fruit.'}</> });
    } else if (totals.kcal < targets.caloriesFloor && hour < 19) {
      const need = targets.caloriesTarget - totals.kcal;
      out.push({ severity: 'info', msg: <><strong>{Math.round(need)} kcal to hit {targets.caloriesTarget.toLocaleString()}.</strong> Eat carb/fat-forward — rice, bread, fruit, nuts.</> });
    }

    if (kcalRemaining < 500 && proteinRemaining > 25) {
      out.push({ severity: 'warn', msg: <><strong>{Math.round(proteinRemaining)}g protein needed</strong> with only {Math.round(kcalRemaining)} kcal of room. Pure-protein only: whey, chicken breast, Greek yogurt.</> });
    }

    const pctKcal = totals.kcal / targets.caloriesTarget;
    if (pctKcal >= 0.40 && pctKcal < 0.85) {
      const lagging = [];
      if (totals.f < targets.fat.min * 0.35) lagging.push({ name: 'fat', tip: 'nuts, butter, avocado' });
      if (totals.c < targets.carbs.min * 0.35) lagging.push({ name: 'carbs', tip: 'rice, bread, oats' });
      if (totals.fiber < targets.fiber.min * 0.35) lagging.push({ name: 'fiber', tip: 'beans, vegetables, oats' });
      if (lagging.length > 0) {
        const names = lagging.map(l => l.name).join(', ');
        out.push({ severity: 'info', msg: <><strong>Pace check:</strong> {names} running behind. Plan your next meal around {lagging[0].tip}.</> });
      }
    }

    if (kcalRemaining > 0 && kcalRemaining < 500) {
      if (totals.f < 50) out.push({ severity: 'warn', msg: <><strong>Fat at {Math.round(totals.f)}g</strong> — below hormonal floor. Add nuts, butter, avocado, or cooking oil.</> });
      if (totals.c < 130) out.push({ severity: 'warn', msg: <><strong>Carbs at {Math.round(totals.c)}g</strong> — add rice, bread, fruit, or potato to close the gap.</> });
      if (totals.fiber < 18) out.push({ severity: 'warn', msg: <><strong>Fiber at {Math.round(totals.fiber)}g</strong> — Mounjaro slows motility. Add beans, vegetables, fruit, or oats.</> });
    }

    return out;
  }, [totals, kcalRemaining, proteinRemaining, now, meals.length, targets]);

  // pace
  const paceFrac = dayPaceFraction(now);
  const kcalFrac = totals.kcal / targets.caloriesTarget;
  const proteinFrac = totals.p / targets.protein;
  // Use whichever is further behind to call out pace risk
  const worstFrac = Math.min(kcalFrac, proteinFrac);
  const paceDelta = worstFrac - paceFrac;
  let paceStatus = 'good', paceMsg = 'On pace';
  if (meals.length === 0 && paceFrac < 0.15) {
    paceStatus = ''; paceMsg = 'Day not started';
  } else if (paceDelta < -0.20) {
    paceStatus = 'bad'; paceMsg = 'Behind pace';
  } else if (paceDelta < -0.10) {
    paceStatus = 'warn'; paceMsg = 'Slightly behind';
  } else if (paceDelta > 0.10) {
    paceStatus = 'good'; paceMsg = 'Ahead of pace';
  }

  return (
    <TargetsContext.Provider value={targets}>
    <div className="app-shell">
      <Topbar now={now} paceStatus={paceStatus} paceMsg={paceMsg} mealCount={meals.length} onClear={clearToday} onSettings={() => setSettingsOpen(true)} />

      <Hero totals={totals} />

      <ImpliedRatio
        impliedRatio={impliedRatio}
        proteinHit={proteinHit}
        kcalHit={kcalHit}
        proteinRemaining={proteinRemaining}
        kcalRemaining={kcalRemaining}
        mealsLogged={meals.length}
      />

      <PaceStrip
        now={now}
        paceFrac={paceFrac}
        kcalFrac={kcalFrac}
        proteinFrac={proteinFrac}
        paceStatus={paceStatus}
      />

      <BudgetTable totals={totals} kcalRemaining={kcalRemaining} proteinRemaining={proteinRemaining} />

      <ProteinDensityChart meals={meals} />

      {warnings.length > 0 && (
        <div style={{ marginTop: 10 }}>
          {warnings.map((w, i) => (
            <div key={i} className={`nudge ${w.severity}`}>
              <div className="nudge-glyph" />
              <div className="nudge-text">{w.msg}</div>
            </div>
          ))}
        </div>
      )}

      {meals.length === 0 && <ArchitectureGuidance />}

      {meals.length > 0 && (
        <MealList
          meals={meals}
          editingId={editingId}
          onEdit={setEditingId}
          onUpdate={updateMeal}
          onRemove={removeMeal}
          onSaveQuick={saveForQuickAdd}
          recentlyAddedId={recentlyAddedId}
        />
      )}

      {meals.length > 0 && <DaySummary totals={totals} />}

      <FabAdd onClick={() => setSheetOpen(true)} />

      {sheetOpen && (
        <AddSheet
          onClose={() => setSheetOpen(false)}
          onAdd={(m) => { addMeal(m); }}
          presets={PRESETS}
          savedMeals={savedMeals}
          onRemoveSaved={removeSaved}
          tab={sheetTab}
          setTab={setSheetTab}
        />
      )}

      {settingsOpen && (
        <SettingsSheet
          targets={targets}
          totals={totals}
          onClose={() => setSettingsOpen(false)}
          onSave={(t) => { setTargets(t); }}
          onReset={() => { setTargets(DEFAULT_TARGETS); }}
        />
      )}
    </div>
    </TargetsContext.Provider>
  );
}

function Topbar({ now, paceStatus, paceMsg, mealCount, onClear, onSettings }) {
  const time = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  return (
    <div className="topbar">
      <div className="topbar-title">
        <div className="topbar-mark" aria-hidden="true">
          <svg viewBox="0 0 14 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="1" width="12" height="14" rx="1.5"/><path d="M1 1v14" stroke="currentColor" strokeWidth="2"/><path d="M5 5h6M5 8h5M5 11h4" opacity="0.6"/></svg>
        </div>
        <div>
          <div className="topbar-h">Daily nutrition</div>
          <div className="topbar-date mono">{formatToday()} · {time}</div>
        </div>

          <span className="dot" /> {paceMsg}

        {mealCount > 0 && (
          <button className="ghost-btn" onClick={onClear} title="Clear today">CLEAR</button>
        )}
        <button className="gear-btn" onClick={onSettings} title="Edit targets" aria-label="Edit targets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5.5C4 4.67 4.67 4 5.5 4H17a3 3 0 0 1 3 3v12.2a.8.8 0 0 1-1.2.7L17 19l-2 1-2-1-2 1-2-1-2 1-1.8-1.1A.8.8 0 0 1 4 19.2V5.5z"/><path d="M8 9h8M8 12.5h8M8 16h5"/></svg>
        </button>
      </div>
    </div>
  );
}

function Hero({ totals }) {
  const targets = useContext(TargetsContext);
  const proteinPct = Math.min(100, (totals.p / targets.protein) * 100);
  const kcalPct = Math.min(100, (totals.kcal / targets.caloriesTarget) * 100);
  const proteinColor = totals.p >= targets.protein ? 'good' : (totals.p / targets.protein > 0.7 ? 'warn' : 'bad');
  const kcalColor = totals.kcal >= targets.caloriesTarget ? 'good'
    : (totals.kcal >= targets.caloriesFloor ? 'warn' : 'bad');
  const proteinLeft = Math.max(0, targets.protein - totals.p);
  const kcalLeft = Math.max(0, targets.caloriesTarget - totals.kcal);

  return (
    <div className="hero">
      <div className="hero-col">
        <div className="hero-label-row">
          <span className="hero-label">Protein</span>
          <span className={`hero-status ${proteinColor}`}>{proteinLeft === 0 ? '✓ HIT' : `−${Math.round(proteinLeft)}g`}</span>
        </div>
        <div className="hero-num mono">
          {Math.round(totals.p)}<span className="target">/{targets.protein}</span>
        </div>
        <div className="hero-rail">
          <div className={`hero-rail-fill ${proteinColor}`} style={{ width: `${proteinPct}%` }} />
        </div>
      </div>
      <div className="hero-divider" />
      <div className="hero-col">
        <div className="hero-label-row">
          <span className="hero-label">Calories</span>
          <span className={`hero-status ${kcalColor}`}>{kcalLeft === 0 ? '✓ HIT' : `−${Math.round(kcalLeft)}`}</span>
        </div>
        <div className="hero-num mono">
          {Math.round(totals.kcal)}<span className="target">/{targets.caloriesTarget}</span>
        </div>
        <div className="hero-rail">
          <div className={`hero-rail-fill ${kcalColor}`} style={{ width: `${kcalPct}%` }} />
        </div>
      </div>
    </div>
  );
}

function ImpliedRatio({ impliedRatio, proteinHit, kcalHit, proteinRemaining, kcalRemaining, mealsLogged }) {
  if (mealsLogged === 0) return null;
  if (proteinHit && kcalHit) return null;

  if (proteinHit) {
    return (
      <div className="ratio-strip info">
        <div className="ratio-left">
          <strong>Protein hit ✓</strong> — fill remaining <strong>{Math.round(kcalRemaining)} kcal</strong> with carb/fat-forward food.
        </div>
      </div>
    );
  }
  if (kcalHit && proteinRemaining > 0) {
    return (
      <div className="ratio-strip bad">
        <div className="ratio-left">
          Over calorie target — <strong>{Math.round(proteinRemaining)}g</strong> protein still short. Lean on whey or Greek yogurt only.
        </div>
      </div>
    );
  }
  if (impliedRatio == null) return null;
  const band = ratioBand(impliedRatio);
  const tip = band === 'good'
    ? 'Achievable with any balanced meal.'
    : band === 'warn'
    ? 'Need protein-forward picks: shake, kebab, enchiladas.'
    : 'Pure protein only: whey, chicken breast, Greek yogurt.';
  return (
    <div className={`ratio-strip ${band}`}>
      <div className="ratio-left">
        Need <strong>{Math.round(proteinRemaining)}g</strong> from <strong>{Math.round(kcalRemaining)} kcal</strong> remaining. {tip}
      </div>
      <div className={`ratio-num mono ${band}`}>
        {impliedRatio.toFixed(1)}<span className="unit">g/100kcal</span>
      </div>
    </div>
  );
}

function PaceStrip({ now, paceFrac, kcalFrac, proteinFrac, paceStatus }) {
  const kcalAt = Math.max(0, Math.round(kcalFrac * 100));
  const proteinAt = Math.max(0, Math.round(proteinFrac * 100));

  const rowStatus = (frac) => {
    const d = frac - paceFrac;
    if (paceFrac < 0.05) return 'neutral';
    if (d < -0.20) return 'bad';
    if (d < -0.10) return 'warn';
    return 'good';
  };
  const kcalStatus = rowStatus(kcalFrac);
  const proteinStatus = rowStatus(proteinFrac);

  const worstFrac = Math.min(kcalFrac, proteinFrac);
  const delta = Math.round((worstFrac - paceFrac) * 100);
  const headlineStatus = paceFrac < 0.05 ? '' : (delta < -20 ? 'bad' : delta < -10 ? 'warn' : 'good');
  const headline = paceFrac < 0.05
    ? 'Day not started'
    : delta >= 0 ? `+${delta}% vs ideal`
    : `${delta}% vs ideal`;

  const timeLabel = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();

  // Time axis: linear from 8a to 9p (13h)
  const START_H = 8, END_H = 21;
  const SPAN = END_H - START_H;
  const hoursNow = now.getHours() + now.getMinutes() / 60;
  const nowPct = Math.min(100, Math.max(0, ((hoursNow - START_H) / SPAN) * 100));
  const ticks = [
    { h: 8,  label: '8a' },
    { h: 10, label: '10a' },
    { h: 12, label: '12p' },
    { h: 14, label: '2p' },
    { h: 16, label: '4p' },
    { h: 18, label: '6p' },
    { h: 20, label: '8p' },
    { h: 21, label: '9p' },
  ];

  const kcalDelta = Math.round((kcalFrac - paceFrac) * 100);
  const proteinDelta = Math.round((proteinFrac - paceFrac) * 100);
  let foot;
  if (paceFrac < 0.05) {
    foot = <>Eating window <span className="num">8a–9p</span>. Pace tracker activates after 8a.</>;
  } else if (paceFrac >= 1) {
    foot = <>Window closed at <span className="num">9p</span>.</>;
  } else if (headlineStatus === 'good') {
    foot = <>On pace at <span className="num">{timeLabel}</span>. Window closes at <span className="num">9p</span>.</>;
  } else {
    const lagging = [];
    if (kcalDelta < -10) lagging.push({ name: 'calories', d: kcalDelta });
    if (proteinDelta < -10) lagging.push({ name: 'protein', d: proteinDelta });
    if (lagging.length === 0) lagging.push({ name: 'overall', d: delta });
    foot = <><span className={`accent ${headlineStatus}`}>Lagging:</span> {lagging.map((l, i) => (
      <span key={l.name}>{i > 0 ? ', ' : ''}{l.name} <span className="num">{l.d}%</span></span>
    ))}. Window closes at <span className="num">9p</span>.</>;
  }

  return (
    <div className="pace-strip">
      <div className="pace-strip-head">
        <span className="eyebrow">Day pace</span>
        <span className={`pace-strip-delta ${headlineStatus}`}>
          <span className="num">{headline}</span>
        </span>
      </div>
      <div className="pace-rows">
        <div className="pace-row-lbl">Calories</div>
        <div className="pace-row-bar">
          <div className={`pace-row-fill actual ${kcalStatus}`} style={{ width: `${Math.min(100, kcalAt)}%` }} />
        </div>
        <div className="pace-row-val">{kcalAt}%</div>

        <div className="pace-row-lbl">Protein</div>
        <div className="pace-row-bar">
          <div className={`pace-row-fill actual ${proteinStatus}`} style={{ width: `${Math.min(100, proteinAt)}%` }} />
        </div>
        <div className="pace-row-val">{proteinAt}%</div>

        <div className="pace-row-lbl" style={{ alignSelf: 'start', paddingTop: 4 }}>Now</div>
        <div className="pace-axis-wrap">
          <div className="pace-axis-line" />
          {ticks.map(t => {
            const pct = ((t.h - START_H) / SPAN) * 100;
            return (
              <React.Fragment key={t.h}>
                <div className="pace-axis-tick" style={{ left: `${pct}%` }} />
                <div className="pace-axis-label" style={{ left: `${pct}%` }}>{t.label}</div>
              </React.Fragment>
            );
          })}
          {hoursNow >= START_H && hoursNow <= END_H && (
            <>
              <div className="pace-now-marker" style={{ left: `${nowPct}%` }} />
              <div className="pace-now-label" style={{ left: `${nowPct}%` }}>{timeLabel}</div>
            </>
          )}
        </div>
        <div />

        <div className="pace-foot">{foot}</div>
      </div>
    </div>
  );
}

function ProteinDensityChart({ meals }) {
  const targets = useContext(TargetsContext);
  const TARGET = (targets.protein / targets.caloriesTarget) * 100;

  const series = useMemo(() => {
    const pts = [{ x: 0, y: 0, name: '' }];
    let cumKcal = 0, cumP = 0;
    for (const m of meals) {
      cumKcal += Number(m.kcal) || 0;
      cumP += Number(m.p) || 0;
      if (cumKcal > 0) pts.push({ x: cumKcal, y: (cumP / cumKcal) * 100, name: m.name });
    }
    return pts;
  }, [meals]);

  const lastKcal = series.length ? series[series.length - 1].x : 0;
  const xMax = Math.max(targets.caloriesTarget, lastKcal);
  const observedY = series.length ? Math.max(...series.map(p => p.y)) : 0;
  const yMax = Math.max(15, Math.ceil(observedY + 2));

  const W = 360, H = 180;
  const padL = 30, padR = 14, padT = 14, padB = 26;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const xScale = (x) => padL + (x / xMax) * plotW;
  const yScale = (y) => padT + (1 - y / yMax) * plotH;

  const current = series.length > 1 ? series[series.length - 1].y : null;
  const lineColor = current == null ? 'var(--info)'
    : current >= TARGET ? 'var(--good)'
    : current >= TARGET - 1 ? 'var(--warn)'
    : 'var(--bad)';

  const drawSeries = series.slice(1); // skip the (0,0) origin
  const pathD = drawSeries.length
    ? `M ${xScale(drawSeries[0].x)} ${yScale(drawSeries[0].y)} `
      + drawSeries.slice(1).map(p => `L ${xScale(p.x)} ${yScale(p.y)}`).join(' ')
    : '';

  // Filled target band: ±0.5 around target (just a hairline really)
  const bandTop = yScale(Math.min(yMax, TARGET + 0.4));
  const bandBot = yScale(Math.max(0, TARGET - 0.4));

  const yTicks = [0, 5, 10, 15];
  if (yMax > 18) yTicks.push(20);
  if (yMax > 23) yTicks.push(25);
  const xTicks = [0, Math.round(targets.caloriesTarget / 2), targets.caloriesTarget];

  return (
    <div className="card chart-card" style={{ marginTop: 10 }}>
      <div className="chart-head">
        <span className="eyebrow">Protein density trajectory</span>
        <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>g/100kcal · cumulative</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} className="chart-svg" preserveAspectRatio="none" style={{ aspectRatio: `${W}/${H}` }}>
        <defs>
          <linearGradient id="trajGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.18" />
            <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
          </linearGradient>
        </defs>

        {yTicks.filter(t => t <= yMax).map(t => (
          <line key={`g${t}`} x1={padL} y1={yScale(t)} x2={W - padR} y2={yScale(t)} stroke="var(--hairline)" strokeWidth="1" />
        ))}

        {/* target band */}
        <rect x={padL} y={bandTop} width={plotW} height={bandBot - bandTop} fill="oklch(0.82 0.16 145 / 0.18)" />
        <line x1={padL} y1={yScale(TARGET)} x2={W - padR} y2={yScale(TARGET)} stroke="var(--good)" strokeWidth="1" strokeDasharray="3 3" opacity="0.85" />
        <text x={W - padR - 4} y={yScale(TARGET) - 4} fill="var(--good)" fontSize="9" textAnchor="end" fontFamily="var(--font-mono)" letterSpacing="0.04em">
          TARGET {TARGET.toFixed(1)}
        </text>

        {/* 2200 kcal vertical guide */}
        <line x1={xScale(targets.caloriesTarget)} y1={padT} x2={xScale(targets.caloriesTarget)} y2={H - padB} stroke="var(--hairline-strong)" strokeDasharray="2 3" />

        {drawSeries.length > 0 && (
          <>
            <path
              d={`${pathD} L ${xScale(drawSeries[drawSeries.length - 1].x)} ${yScale(0)} L ${xScale(drawSeries[0].x)} ${yScale(0)} Z`}
              fill="url(#trajGrad)"
            />
            <path d={pathD} stroke={lineColor} strokeWidth="1.75" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          </>
        )}
        {drawSeries.map((p, i) => (
          <circle key={i} cx={xScale(p.x)} cy={yScale(p.y)} r="2.25" fill="var(--bg)" stroke={lineColor} strokeWidth="1.25" />
        ))}
        {drawSeries.length > 0 && (
          <circle
            cx={xScale(drawSeries[drawSeries.length - 1].x)}
            cy={yScale(drawSeries[drawSeries.length - 1].y)}
            r="4" fill={lineColor} stroke="var(--bg)" strokeWidth="2"
          />
        )}

        {yTicks.filter(t => t <= yMax).map(t => (
          <text key={`yl${t}`} x={padL - 6} y={yScale(t) + 3} fill="var(--muted)" fontSize="9" textAnchor="end" fontFamily="var(--font-mono)">{t}</text>
        ))}
        {xTicks.map(t => (
          <text key={`xl${t}`} x={xScale(t)} y={H - padB + 14} fill="var(--muted)" fontSize="9" textAnchor="middle" fontFamily="var(--font-mono)">
            {t === 0 ? '0' : t.toLocaleString()}
          </text>
        ))}
      </svg>

      <div className="chart-cap">
        {current == null ? (
          <>Stay above <span className="num accent good">{TARGET.toFixed(1)}</span> by end of day to land {targets.protein}g protein at {targets.caloriesTarget.toLocaleString()} kcal.</>
        ) : current >= TARGET ? (
          <>Currently <span className="num accent good">{current.toFixed(1)}</span> · <span className="num">{(current - TARGET).toFixed(1)}</span> above target. Room for fillers.</>
        ) : current >= TARGET - 1 ? (
          <>Currently <span className="num accent warn">{current.toFixed(1)}</span> · <span className="num">{(TARGET - current).toFixed(1)}</span> below target. Bias next meal toward protein.</>
        ) : (
          <>Currently <span className="num accent bad">{current.toFixed(1)}</span> · <span className="num">{(TARGET - current).toFixed(1)}</span> below target. Next meal must be a protein anchor.</>
        )}
      </div>
    </div>
  );
}

    fiber: String(meal.fiber),

      f: parseFloat(form.f) || 0,

      fiber: parseFloat(form.fiber) || 0,
